 <!DOCTYPE html>
<html lang="en">
<head>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 2px solid #444;
            padding: 12px;
            text-align: center;
        }
        thead {
            background-color: #2c3e50;
            color: white;
        }
        /* Styling the row headers (Time) */
        th[scope="row"] {
            background-color: #f2f2f2;
            width: 15%;
        }
        /* Specific colors for long blocks */
        .lab-block { background-color: #e1f5fe; font-weight: bold; color: #01579b; }
        .study-block { background-color: #fff9c4; font-weight: bold; color: #fbc02d; }
    </style>
</head>
<body>

    <table>
        <caption>Science Department - Lab Schedule</caption>
        <thead>
            <tr>
                <th>Time Slot</th>
                <th>Monday</th>
                <th>Tuesday</th>
                <th>Wednesday</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">09:00 - 10:00</th>
                <td>Biology</td>
                <td rowspan="3" class="lab-block">Chemistry Lab<br>(General)</td>
                <td>Physics</td>
            </tr>
            <tr>
                <th scope="row">10:00 - 11:00</th>
                <td>Mathematics</td>
                <td>English</td>
            </tr>
            <tr>
                <th scope="row">11:00 - 12:00</th>
                <td>History</td>
                <td>Geography</td>
            </tr>
            <tr>
                <th scope="row">12:00 - 01:00</th>
                <td rowspan="2" class="study-block">Study Hall</td>
                <td>Lunch</td>
                <td>Lunch</td>
            </tr>
            <tr>
                <th scope="row">01:00 - 02:00</th>
                <td>Programming</td>
                <td>Art</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
