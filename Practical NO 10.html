<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Frames & Embedding Demo</title>
</head>

<body>

<h1 style="text-align:center;">HTML Frames & Embedding Example</h1>

<!-- Navigation Frame -->
<div style="width:20%; float:left; border-right:2px solid gray; height:600px;">
    <h3>Menu</h3>
    <ul>
        <li><a href="https://www.wikipedia.org" target="contentFrame">Wikipedia</a></li>
        <li><a href="https://www.example.com" target="contentFrame">Example Site</a></li>
        <li><a href="https://www.openstreetmap.org" target="contentFrame">OpenStreetMap</a></li>
    </ul>
</div>

<!-- Content Frame -->
<div style="width:80%; float:left; height:600px;">
    <iframe name="contentFrame" width="100%" height="100%" 
            src="https://www.example.com">
    </iframe>
</div>

<div style="clear:both;"></div>

<hr>

<!-- Embedded Map -->
<h2>Embedded Map</h2>
<iframe 
    src="https://www.google.com/maps?q=Pune&output=embed" 
    width="100%" 
    height="400" 
    style="border:0;">
</iframe>

<hr>

<!-- External Page Embed -->
<h2>Embedded External Webpage</h2>
<iframe 
    src="https://www.wikipedia.org" 
    width="100%" 
    height="400">
</iframe>

</body>
</html>
